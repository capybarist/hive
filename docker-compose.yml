# HIVE — Full VPS stack
# 2 BEEs + Aggregator + Qdrant + Caddy (HTTPS)
#
# Usage:
#   cp .env.example .env && nano .env   # set LLM_API_KEY and DOMAIN
#   docker compose up -d
#
# Public endpoint: https://your-domain  (Caddy handles HTTPS automatically)
# Set DOMAIN=hive.yourdomain.com in .env before starting.

services:

  # ── HTTPS reverse proxy (auto-TLS via Let's Encrypt) ─────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: hive-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - aggregator

  # ── Vector database (aggregator backend) ─────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: hive-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    expose:
      - "6333"

  # ── BEE 1 — seed node (no peer) ─────────────────────────────────────────────
  bee-1:
    image: ghcr.io/capybarist/hive:latest
    container_name: hive-bee-1
    restart: unless-stopped
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-}
      - HIVE_PORT=8080
      - HIVE_EMBEDDER_PORT=7700
      - HIVE_DATA_DIR=/hive/data
      - HIVE_EXTRACT_INTERVAL_MS=${HIVE_EXTRACT_INTERVAL_MS:-300000}
      - HIVE_EXTRACT_MAX_FRAGMENTS=${HIVE_EXTRACT_MAX_FRAGMENTS:-20}
    expose:
      - "8080"
    volumes:
      - bee1-data:/hive/data

  # ── BEE 2 — peers with BEE 1 ────────────────────────────────────────────────
  bee-2:
    image: ghcr.io/capybarist/hive:latest
    container_name: hive-bee-2
    restart: unless-stopped
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-}
      - HIVE_PORT=8081
      - HIVE_EMBEDDER_PORT=7701
      - HIVE_DATA_DIR=/hive/data
      - HIVE_PEER=http://bee-1:8080
      - BEE_TOPIC_DOMAIN=${BEE2_TOPIC_DOMAIN:-current_events}
      - HIVE_EXTRACT_INTERVAL_MS=${HIVE_EXTRACT_INTERVAL_MS:-300000}
      - HIVE_EXTRACT_MAX_FRAGMENTS=${HIVE_EXTRACT_MAX_FRAGMENTS:-20}
    expose:
      - "8081"
    volumes:
      - bee2-data:/hive/data
    depends_on:
      - bee-1

  # ── Aggregator — indexes all BEE fragments into Qdrant ───────────────────────
  aggregator:
    image: ghcr.io/capybarist/hive:latest
    container_name: hive-aggregator
    restart: unless-stopped
    command: ["bash", "aggregator.sh"]
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - LLM_API_KEY=${LLM_API_KEY}
      - HIVE_MODE=aggregator
      - HIVE_PORT=8090
      - HIVE_EMBEDDER_PORT=7790
      - HIVE_DATA_DIR=/hive/data
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDER_BACKEND=qdrant
      - HIVE_PEER=http://bee-1:8080
    expose:
      - "8090"
    volumes:
      - aggregator-data:/hive/data
    depends_on:
      - qdrant
      - bee-1

volumes:
  qdrant-data:
  bee1-data:
  bee2-data:
  aggregator-data:
  caddy-data:
  caddy-config:
