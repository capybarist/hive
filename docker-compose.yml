# HIVE v0.8 — Full VPS stack (all-Node, no Python, no Qdrant).
#
# Usage:
#   cp .env.example .env && nano .env   # set LLM_PROVIDER + LLM_API_KEY
#   docker compose up -d                # starts caddy + bee-1 + queen
#
# v0.8 changes vs v0.7:
#   - No qdrant service: the queen now owns an in-process LanceDB (embedded).
#   - No Python embedder: every node runs e5-base ONNX int8 via transformers.js.
#   - The queen volume is renamed aggregator-data → queen-data (one-time op).
#
# Default LLM provider is `gemini` for bees, `groq` for the queen (fast public
# query path). Switch at any time with /api/config or via .env.
#
# Access points (no domain needed):
#   http://your-ip        → Queen (via Caddy)
#   http://your-ip:8080   → BEE-1 directly
#   http://your-ip:8090   → Queen directly
#
# Optional services (off by default — opt in via --profile):
#   docker compose --profile bee-2 up -d     # add a 2nd extractor BEE
#   docker compose --profile ollama up -d    # run a local LLM container

services:

  # ── Reverse proxy ─────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: hive-caddy
    restart: unless-stopped
    command: >
      sh -c "if [ -n \"$$DOMAIN\" ]; then
        exec caddy reverse-proxy --from $$DOMAIN --to queen:8090;
      else
        exec caddy reverse-proxy --from :80 --to queen:8090;
      fi"
    environment:
      - DOMAIN=${DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - queen

  # ── Ollama — local LLM (OPTIONAL, opt-in via profile) ─────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: hive-ollama
    profiles: ["ollama"]
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  ollama-init:
    image: curlimages/curl:latest
    container_name: hive-ollama-init
    profiles: ["ollama"]
    restart: "no"
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:1.5b}
    entrypoint: ["/bin/sh", "-c"]
    command: |
      echo "Pulling $${OLLAMA_MODEL} via Ollama API (this may take a few minutes)..."
      curl -f -m 1200 http://ollama:11434/api/pull \
        -H 'Content-Type: application/json' \
        -d '{"name":"'"$${OLLAMA_MODEL}"'","stream":false}' || { echo "ERROR: model pull failed"; exit 1; }
      echo "Model $${OLLAMA_MODEL} ready"
    depends_on:
      ollama:
        condition: service_healthy

  # ── BEE — extracts and signs v0.8 fragments (vector inline) ────────────────
  bee-1:
    image: ghcr.io/capybarist/hive:latest
    container_name: hive-bee-1
    restart: unless-stopped
    # v0.7.7.12 — give node time to flush its Hypercore on SIGTERM (launcher
    # forwards). Without this, abrupt kills fork the bee's fragments core.
    stop_grace_period: 40s
    environment:
      - HIVE_MODE=bee
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gemini-2.5-flash-lite}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - HIVE_PORT=8080
      - HIVE_DATA_DIR=/hive/data
      # Advertised to peers via PeerMeta so they reach us in the docker network.
      - HIVE_API_URL=http://bee-1:8080
      - HIVE_EXTRACT_INTERVAL_MS=${HIVE_EXTRACT_INTERVAL_MS:-30000}
      - HIVE_EXTRACT_MAX_FRAGMENTS=${HIVE_EXTRACT_MAX_FRAGMENTS:-9}
      - HIVE_EXTRACT_BUDGET_MINUTES=${HIVE_EXTRACT_BUDGET_MINUTES:-20}
    ports:
      - "8080:8080"
    volumes:
      - bee1-data:/hive/data

  # ── Second BEE — arXiv specialist (manifest-driven, intentionally different
  #     from bee-1's Wikipedia scope to exercise multi-bee coordination) ────
  # In v0.8 the per-bee memory budget is ~900 MB (Node + e5-base ONNX int8),
  # so two bees fit comfortably on the 4 GB box. Override any BEE2_* env to
  # change shape without editing this file.
  bee-2:
    image: ghcr.io/capybarist/hive:latest
    container_name: hive-bee-2
    restart: unless-stopped
    stop_grace_period: 40s
    environment:
      - HIVE_MODE=bee
      - LLM_PROVIDER=${LLM_PROVIDER:-gemini}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gemini-2.5-flash-lite}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - HIVE_PORT=8081
      - HIVE_DATA_DIR=/hive/data
      - HIVE_API_URL=http://bee-2:8081
      # ── Manifest knobs — bee-2 is an arXiv specialist on ML papers ──
      - HIVE_SOURCES=${BEE2_SOURCES:-arxiv}
      - HIVE_POLICY=${BEE2_POLICY:-exclusive}
      - HIVE_SCOPE=${BEE2_SCOPE:-{"categories":["cs.LG","cs.AI","cs.CL"]}}
      - HIVE_LANGUAGES=${BEE2_LANGUAGES:-en}
      - HIVE_BEE_REPLICATE=${BEE2_REPLICATE:-none}
      - HIVE_OBJECTIVE=${BEE2_OBJECTIVE:-machine learning research}
      - HIVE_EXTRACT_INTERVAL_MS=${BEE2_INTERVAL_MS:-60000}
      - HIVE_EXTRACT_MAX_FRAGMENTS=${BEE2_MAX_FRAGS:-6}
      - HIVE_EXTRACT_BUDGET_MINUTES=${BEE2_BUDGET_MIN:-15}
    ports:
      - "8081:8081"
    volumes:
      - bee2-data:/hive/data
    depends_on:
      bee-1:
        condition: service_started

  # ── Queen — replicates bee Hypercores, indexes into in-process LanceDB ─────
  queen:
    image: ghcr.io/capybarist/hive:latest
    container_name: hive-queen
    restart: unless-stopped
    stop_grace_period: 40s
    command: ["bash", "queen.sh"]
    networks:
      default:
        aliases:
          # Backward-compat DNS for external consumers that still reference
          # `http://aggregator:8090` (older capybarahome widget builds, dashboards).
          - aggregator
    environment:
      # The queen synthesises public-facing answers, so it wants a fast LLM.
      # Variable names use QUEEN_LLM_* in v0.8; AGGREGATOR_LLM_* still works as
      # a fallback so existing .env files keep functioning.
      - LLM_PROVIDER=${QUEEN_LLM_PROVIDER:-${AGGREGATOR_LLM_PROVIDER:-groq}}
      - LLM_API_KEY=${QUEEN_LLM_API_KEY:-${AGGREGATOR_LLM_API_KEY:-}}
      - LLM_MODEL=${QUEEN_LLM_MODEL:-${AGGREGATOR_LLM_MODEL:-}}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - HIVE_MODE=queen
      - HIVE_PORT=8090
      - HIVE_DATA_DIR=/hive/data
      - HIVE_API_URL=http://queen:8090
      # Dashboard proxy: external /api/crawl widgets ask the queen, the queen
      # forwards to the bee that actually owns the forager state.
      - HIVE_DASHBOARD_BEE_URL=${HIVE_DASHBOARD_BEE_URL:-http://bee-1:8080}
    ports:
      - "8090:8090"
    volumes:
      - queen-data:/hive/data
    depends_on:
      bee-1:
        condition: service_started

volumes:
  bee1-data:
  bee2-data:
  queen-data:        # v0.8 — renamed from aggregator-data. See V0.8-MIGRATION.md §10 for the one-time `docker volume` recipe.
  caddy-data:
  caddy-config:
  ollama-data:
