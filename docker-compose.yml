# HIVE — Full VPS stack
#
# Usage:
#   cp .env.example .env && nano .env   # set LLM_PROVIDER (default: ollama, no key needed)
#   docker compose up -d               # starts everything, pulls AI model automatically
#
# Access points (no domain needed):
#   http://your-ip        → Aggregator (via Caddy)
#   http://your-ip:8080   → BEE directly
#   http://your-ip:8090   → Aggregator directly
#   http://your-ip:6333/dashboard → Qdrant
#
# To use a cloud LLM instead of Ollama:
#   LLM_PROVIDER=groq  LLM_API_KEY=your_key   (in .env)
#
# To add a second BEE:
#   docker compose up -d bee-2

services:

  # ── Reverse proxy ─────────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: hive-caddy
    restart: unless-stopped
    command: >
      sh -c "if [ -n \"$$DOMAIN\" ]; then
        exec caddy reverse-proxy --from $$DOMAIN --to aggregator:8090;
      else
        exec caddy reverse-proxy --from :80 --to aggregator:8090;
      fi"
    environment:
      - DOMAIN=${DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - aggregator

  # ── Vector database ───────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: hive-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"

  # ── Ollama — local LLM (starts automatically, pulls model on first run) ───────
  ollama:
    image: ollama/ollama:latest
    container_name: hive-ollama
    restart: unless-stopped
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:1.5b}
    command: >
      sh -c "ollama serve &
             until ollama list > /dev/null 2>&1; do sleep 2; done &&
             ollama pull $$OLLAMA_MODEL || true &&
             wait"
    volumes:
      - ollama-data:/root/.ollama
    expose:
      - "11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── BEE — extracts and indexes knowledge ──────────────────────────────────────
  bee-1:
    image: ghcr.io/capybarist/hive:latest
    container_name: hive-bee-1
    restart: unless-stopped
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:1.5b}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - HIVE_PORT=8080
      - HIVE_EMBEDDER_PORT=7700
      - HIVE_DATA_DIR=/hive/data
      - HIVE_EXTRACT_INTERVAL_MS=${HIVE_EXTRACT_INTERVAL_MS:-300000}
      - HIVE_EXTRACT_MAX_FRAGMENTS=${HIVE_EXTRACT_MAX_FRAGMENTS:-20}
    ports:
      - "8080:8080"
    volumes:
      - bee1-data:/hive/data
    depends_on:
      ollama:
        condition: service_healthy

  # ── Optional second BEE (start with: docker compose up -d bee-2) ─────────────
  bee-2:
    image: ghcr.io/capybarist/hive:latest
    container_name: hive-bee-2
    profiles: ["bee-2"]
    restart: unless-stopped
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:1.5b}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - HIVE_PORT=8081
      - HIVE_EMBEDDER_PORT=7701
      - HIVE_DATA_DIR=/hive/data
      - HIVE_PEER=http://bee-1:8080
      - BEE_TOPIC_DOMAIN=${BEE2_TOPIC_DOMAIN:-current_events}
      - HIVE_EXTRACT_INTERVAL_MS=${HIVE_EXTRACT_INTERVAL_MS:-300000}
      - HIVE_EXTRACT_MAX_FRAGMENTS=${HIVE_EXTRACT_MAX_FRAGMENTS:-20}
    ports:
      - "8081:8081"
    volumes:
      - bee2-data:/hive/data
    depends_on:
      ollama:
        condition: service_healthy
      bee-1:
        condition: service_started

  # ── Aggregator — indexes all BEE fragments into Qdrant ───────────────────────
  aggregator:
    image: ghcr.io/capybarist/hive:latest
    container_name: hive-aggregator
    restart: unless-stopped
    command: ["bash", "aggregator.sh"]
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:1.5b}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - HIVE_MODE=aggregator
      - HIVE_PORT=8090
      - HIVE_EMBEDDER_PORT=7790
      - HIVE_DATA_DIR=/hive/data
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDER_BACKEND=qdrant
      - HIVE_PEER=http://bee-1:8080
    ports:
      - "8090:8090"
    volumes:
      - aggregator-data:/hive/data
    depends_on:
      qdrant:
        condition: service_started
      bee-1:
        condition: service_started
      ollama:
        condition: service_healthy

volumes:
  qdrant-data:
  bee1-data:
  bee2-data:
  aggregator-data:
  caddy-data:
  caddy-config:
  ollama-data:
