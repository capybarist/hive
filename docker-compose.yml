# HIVE — Full VPS stack
# 2 BEEs + Aggregator + Qdrant + Caddy (reverse proxy)
#
# Usage:
#   cp .env.example .env && nano .env   # set LLM_API_KEY (and optionally DOMAIN)
#   docker compose up -d
#
# Without DOMAIN → HTTP on http://your-vps-ip   (works immediately with bare IP)
# With DOMAIN    → HTTPS via Let's Encrypt       (needs DNS pointing to this VPS)
#
# Direct access (non-standard ports, no HTTPS redirect):
#   http://your-ip:8080  — BEE 1
#   http://your-ip:8081  — BEE 2
#   http://your-ip:8090  — Aggregator API
#   http://your-ip:6333/dashboard  — Qdrant dashboard

services:

  # ── Reverse proxy ─────────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: hive-caddy
    restart: unless-stopped
    command: >
      sh -c "if [ -n \"$$DOMAIN\" ]; then
        exec caddy reverse-proxy --from $$DOMAIN --to aggregator:8090;
      else
        exec caddy reverse-proxy --from :80 --to aggregator:8090;
      fi"
    environment:
      - DOMAIN=${DOMAIN:-}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - aggregator

  # ── Vector database (aggregator backend) ─────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: hive-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"

  # ── BEE 1 — seed node (no peer) ─────────────────────────────────────────────
  bee-1:
    image: ghcr.io/capybarist/hive:latest
    container_name: hive-bee-1
    restart: unless-stopped
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - HIVE_PORT=8080
      - HIVE_EMBEDDER_PORT=7700
      - HIVE_DATA_DIR=/hive/data
      - HIVE_EXTRACT_INTERVAL_MS=${HIVE_EXTRACT_INTERVAL_MS:-300000}
      - HIVE_EXTRACT_MAX_FRAGMENTS=${HIVE_EXTRACT_MAX_FRAGMENTS:-20}
    ports:
      - "8080:8080"
    volumes:
      - bee1-data:/hive/data

  # ── BEE 2 — peers with BEE 1 ────────────────────────────────────────────────
  bee-2:
    image: ghcr.io/capybarist/hive:latest
    container_name: hive-bee-2
    restart: unless-stopped
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - HIVE_PORT=8081
      - HIVE_EMBEDDER_PORT=7701
      - HIVE_DATA_DIR=/hive/data
      - HIVE_PEER=http://bee-1:8080
      - BEE_TOPIC_DOMAIN=${BEE2_TOPIC_DOMAIN:-current_events}
      - HIVE_EXTRACT_INTERVAL_MS=${HIVE_EXTRACT_INTERVAL_MS:-300000}
      - HIVE_EXTRACT_MAX_FRAGMENTS=${HIVE_EXTRACT_MAX_FRAGMENTS:-20}
    ports:
      - "8081:8081"
    volumes:
      - bee2-data:/hive/data
    depends_on:
      - bee-1

  # ── Aggregator — indexes all BEE fragments into Qdrant ───────────────────────
  aggregator:
    image: ghcr.io/capybarist/hive:latest
    container_name: hive-aggregator
    restart: unless-stopped
    command: ["bash", "aggregator.sh"]
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-groq}
      - LLM_API_KEY=${LLM_API_KEY}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - HIVE_MODE=aggregator
      - HIVE_PORT=8090
      - HIVE_EMBEDDER_PORT=7790
      - HIVE_DATA_DIR=/hive/data
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDER_BACKEND=qdrant
      - HIVE_PEER=http://bee-1:8080
    ports:
      - "8090:8090"
    volumes:
      - aggregator-data:/hive/data
    depends_on:
      - qdrant
      - bee-1

  # ── Ollama — local LLM (optional, activate with --profile ollama) ─────────────
  # Usage: docker compose --profile ollama up -d
  # Then pull model once: docker exec hive-ollama ollama pull qwen2.5:3b
  ollama:
    image: ollama/ollama:latest
    container_name: hive-ollama
    profiles: ["ollama"]
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    expose:
      - "11434"

volumes:
  qdrant-data:
  bee1-data:
  bee2-data:
  aggregator-data:
  caddy-data:
  caddy-config:
  ollama-data:
