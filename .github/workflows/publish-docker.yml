name: Publish Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'package.json'
      - 'packages/**'
      - '*.sh'
      - '.github/workflows/publish-docker.yml'
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Determine image tags
        id: meta
        run: |
          BASE_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAGS="${BASE_IMAGE}:${{ steps.version.outputs.version }},${BASE_IMAGE}:latest"
          else
            TAGS="${BASE_IMAGE}:latest,${BASE_IMAGE}:nightly"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "Tags: ${TAGS}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # amd64 only — server is x86 (Hetzner CPX22). arm64 cross-build via
          # QEMU emulation on GH Actions x86 runners adds ~10× build time
          # (1-2 min → 13+ min) for a target we don't deploy to.
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=HIVE
            org.opencontainers.image.description=Decentralized verifiable knowledge base for LLMs
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Docker image summary
        run: |
          echo "## Docker Image Published ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Event:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Only auto-deploy on push to main, not on workflow_dispatch or releases.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Add server to known_hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Sync repo + pull image + recreate stack on server
        # /opt/hive is a git checkout of the main branch. The CI must run
        # `git pull` BEFORE `docker compose up -d` so that compose-level
        # changes (service rename, env vars, profiles, Caddyfile, scripts)
        # ship together with the image. `--ff-only` refuses to overwrite
        # local diverging changes — if the server has drifted, the deploy
        # fails loudly instead of silently. To clean up, SSH and reset
        # manually, then re-run the workflow.
        #
        # `docker image prune -f` is run AFTER the pull (so the new image
        # has tagged the previous `:latest` as dangling first). Each HIVE
        # image is ~1-2 GB on disk (post-v0.7.2 slim pass; was ~10 GB
        # before). Without pruning, every deploy leaves the previous
        # `:latest` as a dangling layer pile; nine of those filled the
        # 75 GB Hetzner disk during the v0.7.1 deploy.
        #
        # We use `-f` (dangling only), NOT `-af`. `-a` would also remove
        # tagged-but-unused images like `ollama/ollama:latest` when the
        # ollama profile is off — annoying to re-pull. Dangling-only is
        # the right tradeoff: it catches our HIVE image cycle (where each
        # deploy untags the prior `:latest`) without touching opt-in
        # images that may legitimately sit idle between profile toggles.
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            set -e
            cd /opt/hive
            git fetch origin main
            git pull --ff-only origin main
            docker compose pull
            docker image prune -f
            docker compose up -d --remove-orphans
            sleep 5
            docker compose ps
          '

      - name: Verify queen booted
        # /api/public-bootstrap is always-public (whitelisted in the v0.8.7
        # auth hook) — using it here means the verifier doesn't need a
        # HIVE_API_KEY secret and works whether auth is on or off.
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -fsS --max-time 5 http://${{ secrets.DEPLOY_HOST }}:8090/api/public-bootstrap >/dev/null; then
              echo "✅ Queen responding after deploy"
              exit 0
            fi
            echo "Waiting for queen ($i/6)..."
            sleep 10
          done
          echo "❌ /api/public-bootstrap did not respond after deploy" >&2
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "## 🚀 Deploy to ${{ secrets.DEPLOY_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Result: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
